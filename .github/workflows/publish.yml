name: Publish to npm

on:
  push:
    branches: [dev, 'rc/*']
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (dev, rc, or latest)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - rc
          - latest

permissions:
  id-token: write   # Required for OIDC trusted publishing
  contents: write   # Required to create releases

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for branch-tag validation

      - name: Validate stable tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ github.ref_name }}"
          # Check that the tagged commit exists on main
          if ! git branch -r --contains "${{ github.sha }}" | grep -q 'origin/main$'; then
            echo "::error::Tag $TAG does not point to a commit on main. Stable releases must be tagged from main."
            exit 1
          fi
          echo "Stable tag $TAG is on main"

      - name: Determine npm tag
        id: npm-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/heads/rc/* ]]; then
            TAG="rc"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="latest"
          else
            TAG="dev"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing with npm tag: $TAG"

      - name: Set version from git tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Set package.json version to $VERSION"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        if: steps.npm-tag.outputs.tag != 'dev'
        run: bun run test

      - name: Typecheck
        run: bun run typecheck

      - name: Check if version already published
        id: check-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@aeriondyseti/vector-memory-mcp@$VERSION" version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not yet published"
          fi

      - name: Publish to npm
        if: steps.check-version.outputs.skip != 'true'
        run: npm publish --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }}

      - name: Get npm token via OIDC (for dist-tag operations)
        if: steps.npm-tag.outputs.tag == 'latest' || steps.npm-tag.outputs.tag == 'rc'
        id: npm-oidc
        run: |
          # npm dist-tag doesn't support OIDC natively (npm/cli#8547)
          # Manually perform the same token exchange that npm publish does
          OIDC_TOKEN=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
            | jq -r '.value')
          ENCODED_PKG=$(jq -rn --arg pkg "@aeriondyseti/vector-memory-mcp" '$pkg | @uri')
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/${ENCODED_PKG}")
          NPM_TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::OIDC token exchange failed. Response: $(echo "$RESPONSE" | jq -c 'del(.token)')"
            exit 1
          fi
          echo "::add-mask::$NPM_TOKEN"
          echo "npm_token=$NPM_TOKEN" >> $GITHUB_OUTPUT

      - name: Cascade dist-tags
        if: steps.npm-tag.outputs.tag == 'latest' && steps.npm-oidc.outputs.npm_token != ''
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npm dist-tag add "@aeriondyseti/vector-memory-mcp@$VERSION" dev
          npm dist-tag add "@aeriondyseti/vector-memory-mcp@$VERSION" rc
          echo "Also tagged $VERSION as @dev and @rc"
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-oidc.outputs.npm_token }}

      - name: Also tag as dev (RC is the latest pre-release)
        if: steps.npm-tag.outputs.tag == 'rc' && steps.npm-oidc.outputs.npm_token != ''
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm dist-tag add "@aeriondyseti/vector-memory-mcp@${VERSION}" dev
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-oidc.outputs.npm_token }}

      - name: Extract changelog for this version
        if: steps.npm-tag.outputs.tag == 'latest'
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUMBER="${VERSION#v}"

          # Extract changelog section between this version and the next
          CHANGELOG=$(awk "/^## \[$VERSION_NUMBER\]/,/^## \[/" CHANGELOG.md | sed '$d' | tail -n +2)

          # Use multiline output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.npm-tag.outputs.tag == 'latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            --verify-tag
